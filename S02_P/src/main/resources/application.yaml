spring:
  application:
    name: S02_P

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
#    show-sql: true             # 콘솔에 SQL 출력
    properties:
      hibernate:
        format_sql: true       # SQL을 한 줄이 아니라 보기 좋게 포맷팅
        use_sql_comments: true # 쿼리가 생성된 이유(주석) 설명 포함

  ai:
    openai:
        api-key: ${OPENAI_SECRET_KEY}
        image:
          options:
            model: gpt-image-2

logging:
  level:
    org.hibernate.SQL: debug # SQL 실행 로그 출력
    org.hibernate.orm.jdbc.bind: trace # (Spring Boot 3.x 이상) 파라미터 바인딩 값 출력
